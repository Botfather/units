name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate npm publish auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Missing NPM_TOKEN secret. Add an npm automation token with publish rights for the @botfather scope."
            exit 1
          fi

          if ! npm whoami >/dev/null 2>&1; then
            echo "::error::NPM_TOKEN is invalid for registry.npmjs.org."
            exit 1
          fi

          if ! npm access ls-packages @botfather >/dev/null 2>&1; then
            echo "::error::NPM_TOKEN cannot access the @botfather scope. Ensure the scope exists in npm and the token has publish permissions."
            exit 1
          fi

      - name: Validate UI-PS quality gates
        run: |
          pnpm -s test:units-tools-transform-verify
          pnpm -s test:ui-ps-bench
          pnpm -s test:ui-ps-gate-check
          pnpm -s bench:ui-ps
          pnpm -s bench:ui-ps:gate

      - name: Version or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
          createGithubReleases: true
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
